name: ROM Dumper urgent

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Firmware Link'
        required: true
      device:
        description: 'Device codename (e.g. cancunf)'
        required: true
        default: 'cancunf'
      binaries:
        description: 'Binary names to extract (comma-separated, e.g. vendor.oplus.hardware.charger,vendor.oplus.hardware.nfc)'
        required: false
        default: ''
      vndk_version:
        description: 'VNDK version to prefer from apex (e.g. 33, 31 — leave empty for auto)'
        required: false
        default: ''

env:
  LINK: ${{ github.event.inputs.link }}
  TZ: Asia/Kolkata

jobs:
  Firmware-Dump:
    runs-on: ubuntu-22.04

    steps:
      - name: Download ROM First
        run: |
          aria2c -x16 -s16 -k1M --check-certificate=false -o rom.zip "$LINK"
          ls -lh rom.zip

      - name: Cleanup Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Clone DumprX
        run: |
          git clone https://github.com/sarthakroy2002/DumprX --depth=1

      - name: Install DumprX Requirements
        run: |
          cd DumprX
          bash setup.sh

      - name: Run DumprX
        run: |
          cd DumprX
          mv ../rom.zip .
          bash dumper.sh rom.zip

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binutils file tree android-sdk-libsparse-utils

      - name: Extract and Mount APEXes
        run: |
          SEARCH_DIR="DumprX/out"
          APEX_EXTRACT_DIR="apex_extracted"
          mkdir -p "$APEX_EXTRACT_DIR"

          echo "=== Locating and extracting APEX files ==="

          # Find all apex files across all partitions
          find "$SEARCH_DIR" -type f -name "*.apex" -o -name "*.capex" 2>/dev/null | while read apex_file; do
            apex_name=$(basename "$apex_file" .apex)
            apex_name=$(basename "$apex_name" .capex)
            echo "Found APEX: $apex_file"

            out_dir="$APEX_EXTRACT_DIR/$apex_name"
            mkdir -p "$out_dir"

            # Extract apex (it's a zip)
            unzip -q "$apex_file" -d "$out_dir" 2>/dev/null || true

            # If payload.img exists, mount/extract it
            if [ -f "$out_dir/apex_payload.img" ]; then
              payload_dir="$out_dir/payload"
              mkdir -p "$payload_dir"

              # Try debugfs extraction (most reliable without root)
              if command -v debugfs >/dev/null 2>&1; then
                debugfs -R "rdump / $payload_dir" "$out_dir/apex_payload.img" 2>/dev/null || true
              fi

              # Fallback: try 7z
              if [ -z "$(ls -A $payload_dir 2>/dev/null)" ]; then
                7z x "$out_dir/apex_payload.img" -o"$payload_dir" 2>/dev/null || true
              fi

              # Fallback: mount as loop
              if [ -z "$(ls -A $payload_dir 2>/dev/null)" ]; then
                sudo mount -o loop,ro "$out_dir/apex_payload.img" "$payload_dir" 2>/dev/null || true
              fi

              lib_count=$(find "$payload_dir" -name "*.so" 2>/dev/null | wc -l)
              echo "  -> Extracted $lib_count libs from $apex_name"
            fi
          done

          # Summary of what we got
          echo ""
          echo "=== APEX extraction summary ==="
          for apex_dir in "$APEX_EXTRACT_DIR"/*/; do
            apex_name=$(basename "$apex_dir")
            lib64_count=$(find "$apex_dir" -path "*/lib64/*.so" 2>/dev/null | wc -l)
            lib32_count=$(find "$apex_dir" -path "*/lib/*.so" ! -path "*/lib64/*" 2>/dev/null | wc -l)
            if [ $((lib64_count + lib32_count)) -gt 0 ]; then
              echo "  $apex_name: lib64=$lib64_count lib=$lib32_count"
            fi
          done

          echo "APEX_EXTRACT_DIR=$APEX_EXTRACT_DIR" >> $GITHUB_ENV

      - name: Collect Files
        run: |
          mkdir -p release_files
          SEARCH_DIR="DumprX/out"

          collect() {
            local label="$1"
            local pattern="$2"
            local dest="$3"
            local type="${4:-f}"
            result=$(find $SEARCH_DIR -path "$pattern" -type $type 2>/dev/null | head -1)
            if [ -n "$result" ]; then
              mkdir -p "release_files/$dest"
              cp -r "$result"/. "release_files/$dest/" 2>/dev/null || cp "$result" "release_files/$dest/"
              echo "Found $label: $result"
            else
              echo "$label not found"
            fi
          }

          collect "vendor/build.prop"      "*/vendor/build.prop"           "."           f
          collect "vendor selinux"         "*/vendor/etc/selinux"          "vendor_selinux"
          collect "system selinux"         "*/system/etc/selinux"          "system_selinux"
          collect "system_ext selinux"     "*/system_ext/etc/selinux"      "system_ext_selinux"
          collect "product selinux"        "*/product/etc/selinux"         "product_selinux"

          # ODM
          result=$(find $SEARCH_DIR -path "*/vendor/odm" -type d 2>/dev/null | head -1)
          [ -z "$result" ] && result=$(find $SEARCH_DIR -path "*/odm" -type d 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            mkdir -p release_files/odm
            cp -r "$result"/. release_files/odm/
            echo "Found odm: $result"
          fi

          cd release_files
          zip -r selinux_all.zip vendor_selinux/ system_selinux/ system_ext_selinux/ product_selinux/ 2>/dev/null || true
          zip -r odm.zip odm/ 2>/dev/null || true
          cd ..

          ls -lh release_files/
          [ -z "$(ls -A release_files/)" ] && { echo "No files collected!"; exit 1; }

      - name: Extract Binaries + Dependencies
        if: ${{ github.event.inputs.binaries != '' }}
        run: |
          SEARCH_DIR="DumprX/out"
          APEX_EXTRACT_DIR="${{ env.APEX_EXTRACT_DIR }}"
          BINARIES_LIST="${{ github.event.inputs.binaries }}"
          VNDK_VER="${{ github.event.inputs.vndk_version }}"

          IFS=',' read -ra BINARIES <<< "$BINARIES_LIST"

          mkdir -p custom_extract
          PROCESSED_LIBS_LOG=custom_extract/processed_libs.log
          MISSING_LIBS_LOG=custom_extract/missing_libs.log
          BINARIES_LOG=custom_extract/binaries.log
          touch "$PROCESSED_LIBS_LOG" "$MISSING_LIBS_LOG" "$BINARIES_LOG"

          # -------------------------------------------------------
          # Build APEX search priority list
          # Priority: vndk.vNN (preferred version) > vndk.vNN (others)
          #         > com.android.runtime > com.android.art
          #         > any other apex with libs
          # -------------------------------------------------------
          build_apex_search_paths() {
            local paths=""

            # If user specified vndk version, put it first
            if [ -n "$VNDK_VER" ]; then
              for apex_dir in \
                "$APEX_EXTRACT_DIR/com.android.vndk.v${VNDK_VER}/payload/lib64" \
                "$APEX_EXTRACT_DIR/com.android.vndk.v${VNDK_VER}/payload/lib" \
                "$SEARCH_DIR/system_ext/apex/com.android.vndk.v${VNDK_VER}/lib64" \
                "$SEARCH_DIR/system_ext/apex/com.android.vndk.v${VNDK_VER}/lib" \
                "$SEARCH_DIR/system/apex/com.android.vndk.v${VNDK_VER}/lib64" \
                "$SEARCH_DIR/system/apex/com.android.vndk.v${VNDK_VER}/lib"; do
                [ -d "$apex_dir" ] && paths="$paths $apex_dir"
              done
            fi

            # Auto-detect all vndk apex versions, sorted descending
            for vndk_apex in $(find "$APEX_EXTRACT_DIR" -maxdepth 1 -name "com.android.vndk.v*" -type d 2>/dev/null | sort -rV); do
              for subdir in "$vndk_apex/payload/lib64" "$vndk_apex/payload/lib"; do
                [ -d "$subdir" ] && paths="$paths $subdir"
              done
            done

            # Also check prebuilt apex dirs in ROM partitions
            for partition in system system_ext product; do
              for vndk_apex in $(find "$SEARCH_DIR/$partition/apex" -maxdepth 1 -name "com.android.vndk.v*" -type d 2>/dev/null | sort -rV); do
                for subdir in "$vndk_apex/lib64" "$vndk_apex/lib"; do
                  [ -d "$subdir" ] && paths="$paths $subdir"
                done
              done
            done

            # Runtime apex (libc, libdl, libm, libbinder_ndk, liblog live here on newer Android)
            for apex_name in com.android.runtime com.android.art; do
              for subdir in \
                "$APEX_EXTRACT_DIR/$apex_name/payload/lib64" \
                "$APEX_EXTRACT_DIR/$apex_name/payload/lib" \
                "$SEARCH_DIR/system/apex/$apex_name/lib64" \
                "$SEARCH_DIR/system/apex/$apex_name/lib"; do
                [ -d "$subdir" ] && paths="$paths $subdir"
              done
            done

            # All remaining apex libs as fallback
            for apex_lib_dir in $(find "$APEX_EXTRACT_DIR" -mindepth 2 -maxdepth 3 \( -name "lib64" -o -name "lib" \) -type d 2>/dev/null); do
              echo "$paths" | grep -qF "$apex_lib_dir" || paths="$paths $apex_lib_dir"
            done

            echo "$paths"
          }

          APEX_SEARCH_PATHS=$(build_apex_search_paths)

          echo "=== APEX search paths ==="
          for p in $APEX_SEARCH_PATHS; do echo "  $p"; done
          echo ""

          # -------------------------------------------------------
          # Extract NEEDED libs from an ELF
          # -------------------------------------------------------
          extract_dependencies() {
            local file="$1"
            [ -f "$file" ] || return
            if file "$file" | grep -q "ELF"; then
              readelf -d "$file" 2>/dev/null | grep "NEEDED" | sed 's/.*\[//' | sed 's/\]//'
              objdump -p "$file" 2>/dev/null | grep "NEEDED" | awk '{print $2}'
            fi
          }

          # -------------------------------------------------------
          # Find a lib: vendor/odm first, then apex paths, then
          # system partitions. Never mix API levels blindly.
          # -------------------------------------------------------
          find_lib() {
            local lib="$1"

            # 1. Vendor / ODM partitions (same API level as HALs)
            for dir in \
              "$SEARCH_DIR/vendor/odm/lib64" \
              "$SEARCH_DIR/vendor/odm/lib" \
              "$SEARCH_DIR/odm/lib64" \
              "$SEARCH_DIR/odm/lib" \
              "$SEARCH_DIR/vendor/lib64" \
              "$SEARCH_DIR/vendor/lib"; do
              [ -f "$dir/$lib" ] && echo "$dir/$lib" && return
            done

            # 2. APEX paths (versioned, safe ABI)
            for apex_dir in $APEX_SEARCH_PATHS; do
              [ -f "$apex_dir/$lib" ] && echo "$apex_dir/$lib" && return
            done

            # 3. system_ext / product (last resort)
            for dir in \
              "$SEARCH_DIR/system_ext/lib64" \
              "$SEARCH_DIR/system_ext/lib" \
              "$SEARCH_DIR/product/lib64" \
              "$SEARCH_DIR/product/lib" \
              "$SEARCH_DIR/system/system/lib64" \
              "$SEARCH_DIR/system/system/lib" \
              "$SEARCH_DIR/system/lib64" \
              "$SEARCH_DIR/system/lib"; do
              [ -f "$dir/$lib" ] && echo "$dir/$lib" && return
            done
          }

          # -------------------------------------------------------
          # Recursively copy lib + its deps
          # -------------------------------------------------------
          copy_lib() {
            local lib="$1"
            local depth="$2"
            [ "$depth" -gt 20 ] && return
            grep -qxF "$lib" "$PROCESSED_LIBS_LOG" 2>/dev/null && return
            echo "$lib" >> "$PROCESSED_LIBS_LOG"

            local found
            found=$(find_lib "$lib")

            if [ -z "$found" ]; then
              echo "    x NOT FOUND: $lib"
              grep -qxF "$lib" "$MISSING_LIBS_LOG" 2>/dev/null || echo "$lib" >> "$MISSING_LIBS_LOG"
              return
            fi

            # Determine destination preserving partition structure
            local rel="${found#$SEARCH_DIR/}"
            # For apex paths not under SEARCH_DIR, put under apex_libs/
            if [ "$rel" = "$found" ]; then
              # Strip APEX_EXTRACT_DIR prefix
              rel="apex_libs/${found#$APEX_EXTRACT_DIR/}"
            fi

            local dest="custom_extract/$rel"
            mkdir -p "$(dirname "$dest")"
            cp "$found" "$dest"
            echo "    + $lib  <-  $found"

            # Recurse into its deps
            extract_dependencies "$found" | sort -u | while read dep; do
              [ -n "$dep" ] && copy_lib "$dep" $((depth + 1))
            done
          }

          # -------------------------------------------------------
          # Process each requested binary
          # -------------------------------------------------------
          for BIN_NAME in "${BINARIES[@]}"; do
            BIN_NAME=$(echo "$BIN_NAME" | xargs)
            echo ""
            echo "========================================="
            echo "Binary: $BIN_NAME"
            echo "========================================="

            BIN_PATH=$(find "$SEARCH_DIR" -type f \
              \( -path "*/bin/hw/*" -o -path "*/bin/*" \) \
              -iname "*${BIN_NAME}*" 2>/dev/null | head -1)

            [ -z "$BIN_PATH" ] && BIN_PATH=$(find "$SEARCH_DIR" -type f -iname "*${BIN_NAME}*" 2>/dev/null | head -1)

            if [ -z "$BIN_PATH" ]; then
              echo "x Binary not found: $BIN_NAME"
              echo "$BIN_NAME: NOT_FOUND" >> "$BINARIES_LOG"
              continue
            fi

            echo "+ Found: $BIN_PATH"
            REL="${BIN_PATH#$SEARCH_DIR/}"
            mkdir -p "custom_extract/$(dirname "$REL")"
            cp "$BIN_PATH" "custom_extract/$REL"
            echo "$BIN_NAME: $REL" >> "$BINARIES_LOG"

            # Deps
            extract_dependencies "$BIN_PATH" | sort -u | while read dep; do
              [ -n "$dep" ] && copy_lib "$dep" 0
            done

            # RC file
            RC=$(find "$SEARCH_DIR" -type f -name "*.rc" \
              -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | head -1)
            if [ -n "$RC" ]; then
              REL="${RC#$SEARCH_DIR/}"
              mkdir -p "custom_extract/$(dirname "$REL")"
              cp "$RC" "custom_extract/$REL"
              echo "+ RC: $REL"
            fi

            # VINTF manifest
            MANIFEST=$(find "$SEARCH_DIR" -path "*/etc/vintf/*.xml" \
              -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | head -1)
            if [ -n "$MANIFEST" ]; then
              REL="${MANIFEST#$SEARCH_DIR/}"
              mkdir -p "custom_extract/$(dirname "$REL")"
              cp "$MANIFEST" "custom_extract/$REL"
              echo "+ Manifest: $REL"
            fi

            # Privapp permissions XML
            PERM=$(find "$SEARCH_DIR" -path "*/etc/permissions/*.xml" \
              -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | head -1)
            if [ -n "$PERM" ]; then
              REL="${PERM#$SEARCH_DIR/}"
              mkdir -p "custom_extract/$(dirname "$REL")"
              cp "$PERM" "custom_extract/$REL"
              echo "+ Permissions XML: $REL"
            fi
          done

          # -------------------------------------------------------
          # Summary
          # -------------------------------------------------------
          echo ""
          echo "========================================="
          echo "Summary"
          echo "========================================="
          echo "Binaries:  $(cat "$BINARIES_LOG" | wc -l)"
          echo "Libs copied: $(sort -u "$PROCESSED_LIBS_LOG" | wc -l)"
          echo "Missing:   $(sort -u "$MISSING_LIBS_LOG" | wc -l)"
          echo ""
          echo "=== Missing libs (need manual sourcing) ==="
          sort -u "$MISSING_LIBS_LOG"
          echo ""
          echo "=== Directory structure ==="
          tree custom_extract -L 4 2>/dev/null || find custom_extract -type f | head -40

          # Zip
          TOTAL=$(find custom_extract -type f 2>/dev/null | wc -l)
          if [ "$TOTAL" -gt 0 ]; then
            cd custom_extract && zip -r ../binary_extract.zip . && cd ..
            echo "Created binary_extract.zip ($TOTAL files)"
            ls -lh binary_extract.zip
          else
            touch binary_extract.zip
          fi

      - name: Test Extracted HALs
        if: ${{ github.event.inputs.binaries != '' }}
        run: |
          SEARCH_DIR="DumprX/out"
          EXTRACT_DIR="custom_extract"
          TEST_LOG="custom_extract/hal_test_results.log"
          PASS=0
          FAIL=0
          SYMBOL_ERR=0

          echo "=== HAL Test Results ===" | tee "$TEST_LOG"
          echo "$(date)" | tee -a "$TEST_LOG"
          echo "" | tee -a "$TEST_LOG"

          # Build LD_LIBRARY_PATH from everything we extracted
          # Collect all dirs that contain .so files
          LIB_PATHS=""
          while IFS= read -r -d '' dir; do
            LIB_PATHS="$LIB_PATHS:$dir"
          done < <(find "$EXTRACT_DIR" -type f -name "*.so" -exec dirname {} \; | sort -u | tr '\n' '\0')

          # Also add apex_libs paths
          while IFS= read -r -d '' dir; do
            LIB_PATHS="$LIB_PATHS:$dir"
          done < <(find "$EXTRACT_DIR/apex_libs" -type d 2>/dev/null | tr '\n' '\0')

          # Strip leading colon
          LIB_PATHS="${LIB_PATHS#:}"

          echo "LD_LIBRARY_PATH dirs:" | tee -a "$TEST_LOG"
          echo "$LIB_PATHS" | tr ':' '\n' | sed 's/^/  /' | tee -a "$TEST_LOG"
          echo "" | tee -a "$TEST_LOG"

          # Find all extracted binaries (in bin/hw or bin/)
          find "$EXTRACT_DIR" -type f \( -path "*/bin/hw/*" -o -path "*/bin/*" \) | while read bin; do

            # Skip non-ELF
            file "$bin" | grep -q "ELF" || continue

            bin_name=$(basename "$bin")
            echo "=========================================" | tee -a "$TEST_LOG"
            echo "HAL: $bin_name" | tee -a "$TEST_LOG"
            echo "Path: $bin" | tee -a "$TEST_LOG"

            chmod +x "$bin"

            # --- Step 1: Static dependency check ---
            echo "" | tee -a "$TEST_LOG"
            echo "[1] Dependency check:" | tee -a "$TEST_LOG"

            dep_missing=0
            readelf -d "$bin" 2>/dev/null | grep "NEEDED" | sed 's/.*\[//' | sed 's/\]//' | while read lib; do
              [ -z "$lib" ] && continue
              found=0
              IFS=':' read -ra DIRS <<< "$LIB_PATHS"
              for d in "${DIRS[@]}"; do
                if [ -f "$d/$lib" ]; then
                  echo "  + $lib  ($d)" | tee -a "$TEST_LOG"
                  found=1
                  break
                fi
              done
              if [ $found -eq 0 ]; then
                echo "  x MISSING: $lib" | tee -a "$TEST_LOG"
                dep_missing=$((dep_missing + 1))
              fi
            done

            # --- Step 2: Symbol verification via nm/readelf ---
            echo "" | tee -a "$TEST_LOG"
            echo "[2] Undefined symbol check:" | tee -a "$TEST_LOG"

            undef_syms=$(readelf --syms "$bin" 2>/dev/null | grep "UND" | grep -v "UND  0" | awk '{print $NF}' | grep -v "^\." | sort -u)
            sym_missing=0

            if [ -n "$undef_syms" ]; then
              # Build combined symbol table from all extracted libs
              COMBINED_SYMS=$(mktemp)
              IFS=':' read -ra DIRS <<< "$LIB_PATHS"
              for d in "${DIRS[@]}"; do
                find "$d" -maxdepth 1 -name "*.so" 2>/dev/null | while read lib_file; do
                  nm -D --defined-only "$lib_file" 2>/dev/null | awk '{print $NF}'
                done
              done > "$COMBINED_SYMS"

              echo "$undef_syms" | while read sym; do
                [ -z "$sym" ] || [ "$sym" = "name" ] && continue
                if grep -qxF "$sym" "$COMBINED_SYMS" 2>/dev/null; then
                  : # symbol found, don't flood log
                else
                  echo "  x UNRESOLVED: $sym" | tee -a "$TEST_LOG"
                  sym_missing=$((sym_missing + 1))
                fi
              done

              rm -f "$COMBINED_SYMS"
            else
              echo "  (no undefined symbols — statically linked or stripped)" | tee -a "$TEST_LOG"
            fi

            # --- Step 3: Actually run the HAL ---
            echo "" | tee -a "$TEST_LOG"
            echo "[3] Runtime test:" | tee -a "$TEST_LOG"

            output=$(LD_LIBRARY_PATH="$LIB_PATHS" timeout 5 "$bin" 2>&1 || true)
            exit_code=$?

            echo "$output" | head -30 | tee -a "$TEST_LOG"

            # Classify result
            if echo "$output" | grep -q "cannot locate symbol\|CANNOT LINK EXECUTABLE\|No such file or directory.*\.so"; then
              echo "" | tee -a "$TEST_LOG"
              echo "  [RESULT] FAIL — symbol/link error" | tee -a "$TEST_LOG"
              SYMBOL_ERR=$((SYMBOL_ERR + 1))
            elif [ $exit_code -eq 124 ] || [ $exit_code -eq 143 ]; then
              echo "" | tee -a "$TEST_LOG"
              echo "  [RESULT] PASS — HAL stayed alive (timeout = bound and waiting)" | tee -a "$TEST_LOG"
              PASS=$((PASS + 1))
            elif [ $exit_code -eq 0 ]; then
              echo "" | tee -a "$TEST_LOG"
              echo "  [RESULT] PASS — clean exit" | tee -a "$TEST_LOG"
              PASS=$((PASS + 1))
            else
              echo "" | tee -a "$TEST_LOG"
              echo "  [RESULT] FAIL — crashed (exit: $exit_code)" | tee -a "$TEST_LOG"
              FAIL=$((FAIL + 1))
            fi

            echo "" | tee -a "$TEST_LOG"
          done

          echo "=========================================" | tee -a "$TEST_LOG"
          echo "FINAL SUMMARY" | tee -a "$TEST_LOG"
          echo "=========================================" | tee -a "$TEST_LOG"
          echo "PASS        : $PASS" | tee -a "$TEST_LOG"
          echo "FAIL (crash): $FAIL" | tee -a "$TEST_LOG"
          echo "FAIL (symbol): $SYMBOL_ERR" | tee -a "$TEST_LOG"
          echo "" | tee -a "$TEST_LOG"

          # Print just the result lines for quick GitHub Actions log scan
          echo "=== Quick results ==="
          grep "RESULT\|HAL:" "$TEST_LOG"
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dump-${{ github.event.inputs.device }}-${{ github.run_number }}
          name: "${{ github.event.inputs.device }} vendor dump"
          body: |
            Firmware: ${{ github.event.inputs.link }}
            Device: ${{ github.event.inputs.device }}
            Binaries: ${{ github.event.inputs.binaries }}
            VNDK preferred: ${{ github.event.inputs.vndk_version || 'auto' }}
          files: |
            release_files/vendor_build.prop
            release_files/selinux_all.zip
            release_files/odm.zip
            binary_extract.zip
            custom_extract/hal_test_results.log
            release_files/vendor_build.prop
            release_files/selinux_all.zip
            release_files/odm.zip
            binary_extract.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
