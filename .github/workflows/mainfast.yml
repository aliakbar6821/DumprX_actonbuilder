name: ROM Dumper urgent

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Firmware Link'
        required: true
      device:
        description: 'Device codename (e.g. cancunf)'
        required: true
        default: 'cancunf'
      binaries:
        description: 'Binary names to extract (comma-separated, e.g. vendor.oplus.hardware.charger,vendor.oplus.hardware.nfc)'
        required: false
        default: ''
      vndk_version:
        description: 'VNDK version to prefer from apex (e.g. 33, 31 — leave empty for auto)'
        required: false
        default: ''

env:
  LINK: ${{ github.event.inputs.link }}
  TZ: Asia/Kolkata

jobs:
  Firmware-Dump:
    runs-on: ubuntu-22.04

    steps:
      - name: Download ROM
        run: |
          aria2c -x16 -s16 -k1M --check-certificate=false -o rom.zip "$LINK"
          ls -lh rom.zip

      - name: Cleanup Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Clone DumprX
        run: |
          git clone https://github.com/sarthakroy2002/DumprX --depth=1

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binutils file tree e2tools

      - name: Install DumprX Requirements
        run: |
          cd DumprX
          bash setup.sh

      - name: Run DumprX
        run: |
          cd DumprX
          mv ../rom.zip .
          bash dumper.sh rom.zip

      - name: Show DumprX Output Structure
        run: |
          echo "=== DumprX out structure (4 levels) ==="
          find DumprX/out -maxdepth 4 -type d | sort | head -80

      - name: Extract and Mount APEXes
        run: |
          SEARCH_DIR="DumprX/out"
          APEX_EXTRACT_DIR="apex_extracted"
          mkdir -p "$APEX_EXTRACT_DIR"

          echo "=== Locating APEX files ==="
          find "$SEARCH_DIR" -type f \( -name "*.apex" -o -name "*.capex" \) \
            ! -path "*/ramdisk/*" ! -path "*/vendor_boot/*" 2>/dev/null | while read apex_file; do

            apex_name=$(basename "$apex_file" .capex)
            apex_name=$(basename "$apex_name" .apex)
            echo "Found: $apex_file -> $apex_name"

            out_dir="$APEX_EXTRACT_DIR/$apex_name"
            mkdir -p "$out_dir"

            unzip -q "$apex_file" -d "$out_dir" 2>/dev/null || true

            if [ -f "$out_dir/apex_payload.img" ]; then
              payload_dir="$out_dir/payload"
              mkdir -p "$payload_dir"

              # Try debugfs first
              if command -v debugfs >/dev/null 2>&1; then
                debugfs -R "rdump / $payload_dir" "$out_dir/apex_payload.img" 2>/dev/null || true
              fi

              # Fallback: 7z
              if [ -z "$(ls -A $payload_dir 2>/dev/null)" ]; then
                7z x "$out_dir/apex_payload.img" -o"$payload_dir" 2>/dev/null || true
              fi

              # Fallback: mount loop
              if [ -z "$(ls -A $payload_dir 2>/dev/null)" ]; then
                sudo mount -o loop,ro "$out_dir/apex_payload.img" "$payload_dir" 2>/dev/null || true
              fi

              lib_count=$(find "$payload_dir" -name "*.so" 2>/dev/null | wc -l)
              echo "  -> $apex_name: $lib_count libs extracted"
            fi
          done

          echo ""
          echo "=== APEX summary ==="
          for apex_dir in "$APEX_EXTRACT_DIR"/*/; do
            apex_name=$(basename "$apex_dir")
            lib64=$(find "$apex_dir" -path "*/lib64/*.so" 2>/dev/null | wc -l)
            lib32=$(find "$apex_dir" -path "*/lib/*.so" ! -path "*/lib64/*" 2>/dev/null | wc -l)
            [ $((lib64 + lib32)) -gt 0 ] && echo "  $apex_name: lib64=$lib64 lib=$lib32"
          done

          echo "APEX_EXTRACT_DIR=$APEX_EXTRACT_DIR" >> $GITHUB_ENV

         - name: Collect Files
        run: |
          mkdir -p release_files
          SEARCH_DIR="DumprX/out"

          # vendor/build.prop — skip ramdisk
          result=$(find "$SEARCH_DIR" -path "*/vendor/build.prop" \
            ! -path "*/ramdisk/*" ! -path "*/vendor_boot/*" 2>/dev/null | head -1)
          [ -z "$result" ] && result=$(find "$SEARCH_DIR" -name "build.prop" \
            ! -path "*/ramdisk/*" 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            cp "$result" release_files/vendor_build.prop
            echo "Found build.prop: $result"
          else
            echo "build.prop not found"
          fi

          # selinux folders
          for partition in vendor system system_ext product; do
            result=$(find "$SEARCH_DIR" -path "*/${partition}/etc/selinux" \
              ! -path "*/ramdisk/*" ! -path "*/vendor_boot/*" -type d 2>/dev/null | head -1)
            if [ -n "$result" ]; then
              mkdir -p "release_files/${partition}_selinux"
              cp -r "$result"/. "release_files/${partition}_selinux/"
              echo "Found ${partition} selinux: $result"
            else
              echo "${partition} selinux not found"
            fi
          done

          # ODM — must have real content, skip ramdisk stubs
          result=""
          for candidate in $(find "$SEARCH_DIR" \
            \( -path "*/vendor/odm" -o -path "*/odm" \) \
            ! -path "*/ramdisk/*" ! -path "*/vendor_boot/*" \
            -type d 2>/dev/null); do
            if find "$candidate" -mindepth 2 -type f 2>/dev/null | grep -q .; then
              result="$candidate"
              break
            fi
          done

          if [ -n "$result" ]; then
            mkdir -p release_files/odm
            cp -r "$result"/. release_files/odm/
            echo "Found odm: $result"
            echo "ODM top-level:"
            ls "$result"
          else
            echo "Real odm not found"
            echo "Available top-level partitions:"
            ls "$SEARCH_DIR"
          fi

          # Zip selinux
          cd release_files
          selinux_args=""
          for d in vendor_selinux system_selinux system_ext_selinux product_selinux; do
            [ -d "$d" ] && [ -n "$(ls -A $d 2>/dev/null)" ] && selinux_args="$selinux_args $d/"
          done
          if [ -n "$selinux_args" ]; then
            zip -r selinux_all.zip $selinux_args
            echo "Created selinux_all.zip"
          else
            touch selinux_all.zip
            echo "No selinux content found"
          fi

          # Zip odm
          if [ -d "odm" ] && [ -n "$(ls -A odm 2>/dev/null)" ]; then
            zip -r odm.zip odm/
            echo "Created odm.zip"
          else
            touch odm.zip
            echo "ODM empty or missing"
          fi

          cd ..
          echo "=== release_files ==="
          ls -lh release_files/

          file_count=$(find release_files -type f ! -name "*.zip" 2>/dev/null | wc -l)
          zip_nonempty=$(find release_files -name "*.zip" -size +100c 2>/dev/null | wc -l)
          if [ $((file_count + zip_nonempty)) -eq 0 ]; then
            echo "Nothing collected!"
            exit 1
          fi

      - name: Extract Binaries + Dependencies
        if: ${{ github.event.inputs.binaries != '' }}
        run: |
          SEARCH_DIR="DumprX/out"
          APEX_EXTRACT_DIR="${{ env.APEX_EXTRACT_DIR }}"
          BINARIES_LIST="${{ github.event.inputs.binaries }}"
          VNDK_VER="${{ github.event.inputs.vndk_version }}"

          IFS=',' read -ra BINARIES <<< "$BINARIES_LIST"

          mkdir -p custom_extract
          PROCESSED_LIBS_LOG=custom_extract/processed_libs.log
          MISSING_LIBS_LOG=custom_extract/missing_libs.log
          BINARIES_LOG=custom_extract/binaries.log
          touch "$PROCESSED_LIBS_LOG" "$MISSING_LIBS_LOG" "$BINARIES_LOG"

          # -------------------------------------------------------
          # Build APEX lib search path priority:
          # 1. User-specified vndk version
          # 2. All vndk versions descending
          # 3. com.android.runtime + com.android.art (libc/libdl/libm/liblog live here)
          # 4. All other extracted apex libs
          # Also checks prebuilt apex dirs inside ROM partitions
          # -------------------------------------------------------
          build_apex_search_paths() {
            local paths=""

            add_if_exists() {
              [ -d "$1" ] && echo "$paths" | grep -qF "$1" || paths="$paths $1"
            }

            # User-specified vndk first
            if [ -n "$VNDK_VER" ]; then
              add_if_exists "$APEX_EXTRACT_DIR/com.android.vndk.v${VNDK_VER}/payload/lib64"
              add_if_exists "$APEX_EXTRACT_DIR/com.android.vndk.v${VNDK_VER}/payload/lib"
              for partition in system system_ext; do
                add_if_exists "$SEARCH_DIR/$partition/apex/com.android.vndk.v${VNDK_VER}/lib64"
                add_if_exists "$SEARCH_DIR/$partition/apex/com.android.vndk.v${VNDK_VER}/lib"
              done
            fi
            # All vndk versions descending
            for vndk_apex in $(find "$APEX_EXTRACT_DIR" -maxdepth 1 \
              -name "com.android.vndk.v*" -type d 2>/dev/null | sort -rV); do
              add_if_exists "$vndk_apex/payload/lib64"
              add_if_exists "$vndk_apex/payload/lib"
            done
            for partition in system system_ext; do
              for vndk_apex in $(find "$SEARCH_DIR/$partition/apex" -maxdepth 1 \
                -name "com.android.vndk.v*" -type d 2>/dev/null | sort -rV); do
                add_if_exists "$vndk_apex/lib64"
                add_if_exists "$vndk_apex/lib"
              done
            done

            # Runtime apex — libc, libdl, libm, liblog, libbinder_ndk
            for apex_name in com.android.runtime com.android.art; do
              add_if_exists "$APEX_EXTRACT_DIR/$apex_name/payload/lib64"
              add_if_exists "$APEX_EXTRACT_DIR/$apex_name/payload/lib"
              for partition in system system_ext; do
                add_if_exists "$SEARCH_DIR/$partition/apex/$apex_name/lib64"
                add_if_exists "$SEARCH_DIR/$partition/apex/$apex_name/lib"
              done
            done

            # All remaining apex as fallback
            for apex_lib_dir in $(find "$APEX_EXTRACT_DIR" -mindepth 2 -maxdepth 3 \
              \( -name "lib64" -o -name "lib" \) -type d 2>/dev/null); do
              add_if_exists "$apex_lib_dir"
            done

            echo "$paths"
          }

          APEX_SEARCH_PATHS=$(build_apex_search_paths)

          echo "=== APEX search paths ==="
          for p in $APEX_SEARCH_PATHS; do echo "  $p"; done
          echo ""

          # -------------------------------------------------------
          # Extract NEEDED libs from ELF
          # -------------------------------------------------------
          extract_dependencies() {
            local file="$1"
            [ -f "$file" ] || return
            file "$file" | grep -q "ELF" || return
            readelf -d "$file" 2>/dev/null | grep "NEEDED" | sed 's/.*\[//' | sed 's/\]//'
            objdump -p "$file" 2>/dev/null | grep "NEEDED" | awk '{print $2}'
          }

          # -------------------------------------------------------
          # Find lib — vendor/odm > apex (versioned) > runtime apex
          # > system_ext > system. Never use live device paths.
          # -------------------------------------------------------
          find_lib() {
            local lib="$1"

            # Vendor / ODM (same API level as HALs)
            for dir in \
              "$SEARCH_DIR/vendor/odm/lib64" \
              "$SEARCH_DIR/vendor/odm/lib" \
              "$SEARCH_DIR/odm/lib64" \
              "$SEARCH_DIR/odm/lib" \
              "$SEARCH_DIR/vendor/lib64" \
              "$SEARCH_DIR/vendor/lib"; do
              [ -f "$dir/$lib" ] && echo "$dir/$lib" && return
            done

            # APEX paths (versioned safe ABI)
            for apex_dir in $APEX_SEARCH_PATHS; do
              [ -f "$apex_dir/$lib" ] && echo "$apex_dir/$lib" && return
            done

            # system_ext / product / system last resort
            for dir in \
              "$SEARCH_DIR/system_ext/lib64" \
              "$SEARCH_DIR/system_ext/lib" \
              "$SEARCH_DIR/product/lib64" \
              "$SEARCH_DIR/product/lib" \
              "$SEARCH_DIR/system/system/lib64" \
              "$SEARCH_DIR/system/system/lib" \
              "$SEARCH_DIR/system/lib64" \
              "$SEARCH_DIR/system/lib"; do
              [ -f "$dir/$lib" ] && echo "$dir/$lib" && return
            done
          }

          # -------------------------------------------------------
          # Recursively copy lib + its transitive deps
          # -------------------------------------------------------
          copy_lib() {
            local lib="$1"
            local depth="$2"
            [ "$depth" -gt 20 ] && return
            grep -qxF "$lib" "$PROCESSED_LIBS_LOG" 2>/dev/null && return
            echo "$lib" >> "$PROCESSED_LIBS_LOG"

            local found
            found=$(find_lib "$lib")

            if [ -z "$found" ]; then
              echo "    x NOT FOUND: $lib"
              grep -qxF "$lib" "$MISSING_LIBS_LOG" 2>/dev/null || echo "$lib" >> "$MISSING_LIBS_LOG"
              return
            fi

            local rel="${found#$SEARCH_DIR/}"
            # If from apex (not under SEARCH_DIR), put under apex_libs/
            if [ "$rel" = "$found" ]; then
              rel="apex_libs/${found#$APEX_EXTRACT_DIR/}"
            fi

            local dest="custom_extract/$rel"
            mkdir -p "$(dirname "$dest")"
            cp "$found" "$dest"
            echo "    + $lib  <-  $found"

            # Recurse
            extract_dependencies "$found" | sort -u | while read dep; do
              [ -n "$dep" ] && copy_lib "$dep" $((depth + 1))
            done
          }

          # -------------------------------------------------------
          # Process each requested binary
          # -------------------------------------------------------
          for BIN_NAME in "${BINARIES[@]}"; do
            BIN_NAME=$(echo "$BIN_NAME" | xargs)
            echo ""
            echo "========================================="
            echo "Binary: $BIN_NAME"
            echo "========================================="

            BIN_PATH=$(find "$SEARCH_DIR" -type f \
              \( -path "*/bin/hw/*" -o -path "*/bin/*" \) \
              ! -path "*/ramdisk/*" ! -path "*/vendor_boot/*" \
              -iname "*${BIN_NAME}*" 2>/dev/null | head -1)

            [ -z "$BIN_PATH" ] && BIN_PATH=$(find "$SEARCH_DIR" -type f \
              ! -path "*/ramdisk/*" ! -path "*/vendor_boot/*" \
              -iname "*${BIN_NAME}*" 2>/dev/null | head -1)

            if [ -z "$BIN_PATH" ]; then
              echo "x Binary not found: $BIN_NAME"
              echo "$BIN_NAME: NOT_FOUND" >> "$BINARIES_LOG"
              continue
            fi

            echo "+ Found: $BIN_PATH"
            REL="${BIN_PATH#$SEARCH_DIR/}"
            mkdir -p "custom_extract/$(dirname "$REL")"
            cp "$BIN_PATH" "custom_extract/$REL"
            echo "$BIN_NAME: $REL" >> "$BINARIES_LOG"

            # Deps
            echo "  Resolving dependencies..."
            extract_dependencies "$BIN_PATH" | sort -u | while read dep; do
              [ -n "$dep" ] && copy_lib "$dep" 0
            done

            # RC file
            RC=$(find "$SEARCH_DIR" -type f -name "*.rc" \
              ! -path "*/ramdisk/*" \
              -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | head -1)
            if [ -n "$RC" ]; then
              REL="${RC#$SEARCH_DIR/}"
              mkdir -p "custom_extract/$(dirname "$REL")"
              cp "$RC" "custom_extract/$REL"
              echo "  + RC: $REL"
            fi

            # VINTF manifest
            MANIFEST=$(find "$SEARCH_DIR" -path "*/etc/vintf/*.xml" \
              ! -path "*/ramdisk/*" \
              -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | head -1)
            if [ -n "$MANIFEST" ]; then
              REL="${MANIFEST#$SEARCH_DIR/}"
              mkdir -p "custom_extract/$(dirname "$REL")"
              cp "$MANIFEST" "custom_extract/$REL"
              echo "  + Manifest: $REL"
            fi

            # Privapp permissions
            PERM=$(find "$SEARCH_DIR" -path "*/etc/permissions/*.xml" \
              ! -path "*/ramdisk/*" \
              -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | head -1)
            if [ -n "$PERM" ]; then
              REL="${PERM#$SEARCH_DIR/}"
              mkdir -p "custom_extract/$(dirname "$REL")"
              cp "$PERM" "custom_extract/$REL"
              echo "  + Permissions: $REL"
            fi
          done
          # Summary
          echo ""
          echo "========================================="
          echo "Extraction Summary"
          echo "========================================="
          echo "Binaries   : $(wc -l < "$BINARIES_LOG")"
          echo "Libs copied: $(sort -u "$PROCESSED_LIBS_LOG" | wc -l)"
          echo "Missing    : $(sort -u "$MISSING_LIBS_LOG" | wc -l)"
          echo ""
          echo "=== Missing libs ==="
          sort -u "$MISSING_LIBS_LOG"
          echo ""
          echo "=== Structure ==="
          tree custom_extract -L 4 2>/dev/null || find custom_extract -type f | head -50

          TOTAL=$(find custom_extract -type f 2>/dev/null | wc -l)
          if [ "$TOTAL" -gt 0 ]; then
            cd custom_extract && zip -r ../binary_extract.zip . && cd ..
            echo "Created binary_extract.zip ($TOTAL files)"
            ls -lh binary_extract.zip
          else
            touch binary_extract.zip
          fi

      - name: Test Extracted HALs
        if: ${{ github.event.inputs.binaries != '' }}
        run: |
          EXTRACT_DIR="custom_extract"
          TEST_LOG="custom_extract/hal_test_results.log"
          PASS=0
          FAIL=0
          SYMBOL_ERR=0

          echo "=== HAL Test Results ===" | tee "$TEST_LOG"
          echo "$(date)" | tee -a "$TEST_LOG"
          echo "" | tee -a "$TEST_LOG"

          # Build LD_LIBRARY_PATH from all dirs containing .so in extract
          LIB_PATHS=$(find "$EXTRACT_DIR" -type f -name "*.so" \
            -exec dirname {} \; | sort -u | tr '\n' ':' | sed 's/:$//')

          echo "LD_LIBRARY_PATH:" | tee -a "$TEST_LOG"
          echo "$LIB_PATHS" | tr ':' '\n' | sed 's/^/  /' | tee -a "$TEST_LOG"
          echo "" | tee -a "$TEST_LOG"

          # Build combined symbol table from all extracted libs once
          COMBINED_SYMS=$(mktemp)
          echo "Building symbol table from extracted libs..."
          find "$EXTRACT_DIR" -type f -name "*.so" | while read lib_file; do
            nm -D --defined-only "$lib_file" 2>/dev/null | awk '{print $NF}'
          done | sort -u > "$COMBINED_SYMS"
          echo "Symbol table: $(wc -l < "$COMBINED_SYMS") symbols"
          echo "" | tee -a "$TEST_LOG"

          # Test each extracted binary
          find "$EXTRACT_DIR" -type f \
            \( -path "*/bin/hw/*" -o -path "*/bin/*" \) | while read bin; do

            file "$bin" | grep -q "ELF" || continue
            bin_name=$(basename "$bin")

            echo "=========================================" | tee -a "$TEST_LOG"
            echo "HAL: $bin_name" | tee -a "$TEST_LOG"
            echo "Path: $bin" | tee -a "$TEST_LOG"
            chmod +x "$bin"

            # --- Step 1: Static dep check ---
            echo "" | tee -a "$TEST_LOG"
            echo "[1] Dependencies:" | tee -a "$TEST_LOG"
            dep_missing=0
            readelf -d "$bin" 2>/dev/null \
              | grep "NEEDED" | sed 's/.*\[//' | sed 's/\]//' \
              | while read lib; do
              [ -z "$lib" ] && continue
              found=0
              IFS=':' read -ra DIRS <<< "$LIB_PATHS"
              for d in "${DIRS[@]}"; do
                if [ -f "$d/$lib" ]; then
                  echo "  + $lib  ($d)" | tee -a "$TEST_LOG"
                  found=1
                  break
                fi
              done
              if [ $found -eq 0 ]; then
                echo "  x MISSING: $lib" | tee -a "$TEST_LOG"
              fi
            done

            # --- Step 2: Undefined symbol check ---
            echo "" | tee -a "$TEST_LOG"
            echo "[2] Undefined symbols:" | tee -a "$TEST_LOG"
            undef_count=0
            readelf --syms "$bin" 2>/dev/null \
              | grep " UND " | grep -v "UND  0 " \
              | awk '{print $NF}' | grep -v '^\.' | sort -u \
              | while read sym; do
              [ -z "$sym" ] || [ "$sym" = "Name" ] && continue
              if ! grep -qxF "$sym" "$COMBINED_SYMS" 2>/dev/null; then
                echo "  x UNRESOLVED: $sym" | tee -a "$TEST_LOG"
              fi
            done
            unresolved=$(readelf --syms "$bin" 2>/dev/null \
              | grep " UND " | grep -v "UND  0 " \
              | awk '{print $NF}' | grep -v '^\.' | sort -u \
              | while read sym; do
                [ -z "$sym" ] && continue
                grep -qxF "$sym" "$COMBINED_SYMS" 2>/dev/null || echo "$sym"
              done | wc -l)
            [ "$unresolved" -eq 0 ] && echo "  All symbols resolved" | tee -a "$TEST_LOG"

            # --- Step 3: Runtime test ---
            echo "" | tee -a "$TEST_LOG"
            echo "[3] Runtime:" | tee -a "$TEST_LOG"
            output=$(LD_LIBRARY_PATH="$LIB_PATHS" timeout 5 "$bin" 2>&1 || true)
            exit_code=$?
            echo "$output" | head -30 | tee -a "$TEST_LOG"

            echo "" | tee -a "$TEST_LOG"
            if echo "$output" | grep -q "cannot locate symbol\|CANNOT LINK EXECUTABLE"; then
              echo "  [RESULT] FAIL — symbol/link error" | tee -a "$TEST_LOG"
            elif [ $exit_code -eq 124 ] || [ $exit_code -eq 143 ]; then
              echo "  [RESULT] PASS — HAL alive (bound and waiting)" | tee -a "$TEST_LOG"
            elif [ $exit_code -eq 0 ]; then
              echo "  [RESULT] PASS — clean exit" | tee -a "$TEST_LOG"
            else
              echo "  [RESULT] FAIL — crashed (exit: $exit_code)" | tee -a "$TEST_LOG"
            fi
            echo "" | tee -a "$TEST_LOG"
          done

          rm -f "$COMBINED_SYMS"

          echo "=========================================" | tee -a "$TEST_LOG"
          echo "=== Quick results ===" | tee -a "$TEST_LOG"
          grep -E "HAL:|RESULT" "$TEST_LOG"

          # Re-zip with test log included
          cd custom_extract && zip -r ../binary_extract.zip . && cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dump-${{ github.event.inputs.device }}-${{ github.run_number }}
          name: "${{ github.event.inputs.device }} vendor dump"
          body: |
            Firmware: ${{ github.event.inputs.link }}
            Device: ${{ github.event.inputs.device }}
            Binaries: ${{ github.event.inputs.binaries }}
            VNDK preferred: ${{ github.event.inputs.vndk_version || 'auto' }}
          files: |
            release_files/vendor_build.prop
            release_files/selinux_all.zip
            release_files/odm.zip
            binary_extract.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
