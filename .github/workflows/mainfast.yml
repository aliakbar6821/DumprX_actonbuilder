name: ROM Dumper urgent advance 

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Firmware Link'
        required: true
      device:
        description: 'Device codename (e.g. cancunf)'
        required: true
        default: 'cancunf'
      binary:
        description: 'Binary name to extract (optional, e.g. vendor.oplus.hardware.charger)'
        required: false

env:
  LINK: ${{ github.event.inputs.link }}
  TZ: Asia/Kolkata

jobs:
  Firmware-Dump:
    runs-on: ubuntu-22.04

    steps:
      - name: Download ROM First
        run: |
          aria2c -x16 -s16 -k1M --check-certificate=false -o rom.zip "$LINK"
          ls -lh rom.zip

      - name: Cleanup Space
        uses: rokibhasansagar/slimhub_actions@main

      - name: Clone DumprX
        run: |
          git clone https://github.com/sarthakroy2002/DumprX --depth=1

      - name: Install DumprX Requirements
        run: |
          cd DumprX
          bash setup.sh

      - name: Run DumprX
        run: |
          cd DumprX
          mv ../rom.zip .
          bash dumper.sh rom.zip

      - name: Collect Files
        run: |
          mkdir -p release_files
          SEARCH_DIR="DumprX/out"

          # vendor/build.prop
          result=$(find $SEARCH_DIR -path "*/vendor/build.prop" 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            cp "$result" release_files/vendor_build.prop
            echo "Found: $result"
          else
            echo "vendor/build.prop not found"
          fi

          # vendor selinux folder
          result=$(find $SEARCH_DIR -path "*/vendor/etc/selinux" -type d 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            mkdir -p release_files/vendor_selinux
            cp -r "$result"/. release_files/vendor_selinux/
            echo "Found vendor selinux: $result"
          else
            echo "vendor selinux not found"
          fi

          # system selinux folder
          result=$(find $SEARCH_DIR -path "*/system/etc/selinux" -type d 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            mkdir -p release_files/system_selinux
            cp -r "$result"/. release_files/system_selinux/
            echo "Found system selinux: $result"
          else
            echo "system selinux not found"
          fi

          # system_ext selinux folder
          result=$(find $SEARCH_DIR -path "*/system_ext/etc/selinux" -type d 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            mkdir -p release_files/system_ext_selinux
            cp -r "$result"/. release_files/system_ext_selinux/
            echo "Found system_ext selinux: $result"
          else
            echo "system_ext selinux not found"
          fi

          # product selinux folder
          result=$(find $SEARCH_DIR -path "*/product/etc/selinux" -type d 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            mkdir -p release_files/product_selinux
            cp -r "$result"/. release_files/product_selinux/
            echo "Found product selinux: $result"
          else
            echo "product selinux not found"
          fi

          # ODM (vendor/odm or odm)
          result=$(find $SEARCH_DIR -path "*/vendor/odm" -type d 2>/dev/null | head -1)
          if [ -z "$result" ]; then
            result=$(find $SEARCH_DIR -path "*/odm" -type d 2>/dev/null | head -1)
          fi

          if [ -n "$result" ]; then
            mkdir -p release_files/odm
            cp -r "$result"/. release_files/odm/
            echo "Found odm: $result"
          else
            echo "odm not found"
          fi

          # Zip selinux folders
          cd release_files
          zip -r selinux_all.zip vendor_selinux/ system_selinux/ system_ext_selinux/ product_selinux/ 2>/dev/null || true

          # Zip odm
          zip -r odm.zip odm/ 2>/dev/null || true
          cd ..

          echo "=== Files to upload ==="
          ls -lh release_files/

          # Fail if nothing collected
          if [ -z "$(ls -A release_files/)" ]; then
            echo "No files collected!"
            exit 1
          fi

      - name: Extract Specific Binary + Dependencies
        if: ${{ github.event.inputs.binary != '' }}
        run: |
          SEARCH_DIR="DumprX/out"
          BIN_NAME="${{ github.event.inputs.binary }}"

          mkdir -p custom_extract
          DEP_LIST=custom_extract/deps.list
          LOG=custom_extract/extract.log

          echo "Searching for binary: $BIN_NAME"

          # Find binary (flexible match)
          BIN_PATH=$(find $SEARCH_DIR -type f \( -path "*/bin/*" -o -path "*/vendor/bin/*" -o -path "*/system/bin/*" \) -iname "*$BIN_NAME*" 2>/dev/null | head -1)
          
          # If not found in bin paths, search everywhere
          if [ -z "$BIN_PATH" ]; then
            BIN_PATH=$(find $SEARCH_DIR -type f -iname "*$BIN_NAME*" 2>/dev/null | head -1)
          fi

          if [ -z "$BIN_PATH" ]; then
            echo "Binary not found!"
            exit 1
          fi

          echo "Found binary: $BIN_PATH"

          # Preserve structure
          REL_PATH=${BIN_PATH#$SEARCH_DIR/}
          mkdir -p custom_extract/$(dirname "$REL_PATH")
          cp "$BIN_PATH" custom_extract/$REL_PATH

          # Install required tools for better dependency analysis
          sudo apt-get update
          sudo apt-get install -y binutils file

          # Function to extract all dependencies using multiple methods
          extract_dependencies() {
            local FILE="$1"
            echo "Analyzing: $FILE"
            
            # Method 1: Use ldd if available (for native analysis)
            if file "$FILE" | grep -q "ELF"; then
              # Use readelf to get dynamic section
              readelf -d "$FILE" 2>/dev/null | grep "NEEDED" | sed 's/.*\[//' | sed 's/\]//' >> "$DEP_LIST"
              
              # Use objdump for more thorough checking
              objdump -p "$FILE" 2>/dev/null | grep "NEEDED" | awk '{print $2}' >> "$DEP_LIST"
              
              # Use strings for any missed dependencies
              strings "$FILE" | grep -E '\.so(\.[0-9]+)?$' >> "$DEP_LIST"
            fi
          }

          # Function to copy library and its dependencies recursively
          copy_lib() {
            local LIB_NAME="$1"
            local DEPTH="$2"
            
            # Normalize library name (remove version suffixes)
            local BASE_LIB=$(echo "$LIB_NAME" | sed 's/\.so\.[0-9.]*$/.so/' | sed 's/\.so$/.so/')
            
            # Skip if already processed
            if grep -q "^$BASE_LIB$" "$LOG" 2>/dev/null; then
              return 0
            fi
            
            echo "Looking for: $BASE_LIB (from $LIB_NAME)"
            
            # Search in all possible locations within DumprX output
            FOUND=$(find $SEARCH_DIR -type f -name "$BASE_LIB" -o -name "$LIB_NAME" 2>/dev/null | head -1)
            
            # If not found, try with wildcard for versioned libs
            if [ -z "$FOUND" ]; then
              FOUND=$(find $SEARCH_DIR -type f -name "${BASE_LIB}.*" 2>/dev/null | head -1)
            fi
            
            if [ -n "$FOUND" ]; then
              REL=${FOUND#$SEARCH_DIR/}
              mkdir -p custom_extract/$(dirname "$REL")
              cp "$FOUND" custom_extract/$REL
              echo "$BASE_LIB" >> "$LOG"
              echo "✓ Copied: $REL"
              
              # Recursively process this library's dependencies
              process_file "$FOUND" $((DEPTH + 1))
              return 0
            else
              echo "✗ Not found: $LIB_NAME"
              return 1
            fi
          }

          # Process a file to extract all its dependencies
          process_file() {
            local FILE="$1"
            local DEPTH="$2"
            
            # Limit recursion depth
            if [ "$DEPTH" -gt 10 ]; then
              return 0
            fi
            
            # Clear and regenerate dependency list for this file
            > "$DEP_LIST"
            extract_dependencies "$FILE"
            
            # Process each unique dependency
            sort -u "$DEP_LIST" | while read lib; do
              if [ -n "$lib" ]; then
                copy_lib "$lib" "$DEPTH"
              fi
            done
          }

          # Initialize tracking
          touch "$LOG"
          > "$DEP_LIST"
          
          # Process the main binary
          process_file "custom_extract/$REL_PATH" 0
          
          # Additional pass to catch any missed dependencies
          echo "Running second pass to catch missed dependencies..."
          find custom_extract -type f -name "*.so" | while read libfile; do
            process_file "$libfile" 0
          done

          # Also copy all libraries from vendor/lib and vendor/lib64 that might be needed
          echo "Copying common vendor libraries..."
          COMMON_LIBS=("libbase.so" "libcutils.so" "libutils.so" "liblog.so" "libc++.so" "libc.so" "libm.so" "libdl.so" "libhidlbase.so" "libhidltransport.so" "libhwbinder.so" "libbinder.so")
          
          for common_lib in "${COMMON_LIBS[@]}"; do
            if ! grep -q "^$common_lib$" "$LOG" 2>/dev/null; then
              FOUND=$(find $SEARCH_DIR -type f -name "$common_lib" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                REL=${FOUND#$SEARCH_DIR/}
                mkdir -p custom_extract/$(dirname "$REL")
                cp "$FOUND" custom_extract/$REL
                echo "$common_lib" >> "$LOG"
                echo "✓ Copied common lib: $REL"
              fi
            fi
          done

          # Find and copy all HAL-related files
          echo "Searching for HAL files..."
          find $SEARCH_DIR -type f \( -name "*.hal" -o -name "*manifest*.xml" -o -name "*compatibility*.xml" \) | while read hal_file; do
            if grep -q "$BIN_NAME" "$hal_file" 2>/dev/null; then
              REL=${hal_file#$SEARCH_DIR/}
              mkdir -p custom_extract/$(dirname "$REL")
              cp "$hal_file" custom_extract/$REL
              echo "✓ Copied HAL/config: $REL"
            fi
          done

          # Find .rc file
          RC_FILE=$(find $SEARCH_DIR -type f -name "*.rc" -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | head -1)
          if [ -n "$RC_FILE" ]; then
            REL=${RC_FILE#$SEARCH_DIR/}
            mkdir -p custom_extract/$(dirname "$REL")
            cp "$RC_FILE" custom_extract/$REL
            echo "✓ Copied RC file: $REL"
          fi

          # Find manifest.xml
          MANIFEST=$(find $SEARCH_DIR -type f -name "manifest.xml" -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | head -1)
          if [ -n "$MANIFEST" ]; then
            REL=${MANIFEST#$SEARCH_DIR/}
            mkdir -p custom_extract/$(dirname "$REL")
            cp "$MANIFEST" custom_extract/$REL
            echo "✓ Copied manifest.xml: $REL"
          fi

          # Also copy any vendor.rc or init scripts
          find $SEARCH_DIR -type f \( -name "init*.rc" -o -name "*.vendor.rc" \) -exec grep -l "$BIN_NAME" {} \; 2>/dev/null | while read rcfile; do
            REL=${rcfile#$SEARCH_DIR/}
            mkdir -p custom_extract/$(dirname "$REL")
            cp "$rcfile" custom_extract/$REL
            echo "✓ Copied init script: $REL"
          done

          # Show what was extracted
          echo ""
          echo "=== Extracted files ==="
          find custom_extract -type f | sort
          
          echo ""
          echo "=== Libraries found ==="
          cat "$LOG" | sort -u

          # Zip everything
          if [ -d "custom_extract" ] && [ "$(ls -A custom_extract)" ]; then
            cd custom_extract
            zip -r ../binary_extract.zip .
            cd ..
            echo ""
            echo "✓ Created binary_extract.zip with $(find custom_extract -type f | wc -l) files"
            ls -lh binary_extract.zip
          else
            echo "No files extracted for binary"
            exit 1
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dump-${{ github.event.inputs.device }}-${{ github.run_number }}
          name: "${{ github.event.inputs.device }} vendor dump"
          body: |
            Firmware: ${{ github.event.inputs.link }}
            Device: ${{ github.event.inputs.device }}
            Binary: ${{ github.event.inputs.binary }}
          files: |
            release_files/vendor_build.prop
            release_files/selinux_all.zip
            release_files/odm.zip
            binary_extract.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
