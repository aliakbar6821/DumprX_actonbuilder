name: ROM Dumper fast

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Firmware Link'
        required: true
      device:
        description: 'Device codename (e.g. cancunf)'
        required: true
        default: 'cancunf'

env:
  LINK: ${{ github.event.inputs.link }}
  TZ: Asia/Kolkata

jobs:
  Firmware-Dump:
    runs-on: ubuntu-22.04
    steps:

      - name: Cleanup Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install Dependencies
        run: |
          sudo apt -y update
          sudo apt install -y unzip p7zip-full

      - name: Install payload-dumper-go
        run: |
          LATEST=$(curl -s https://api.github.com/repos/ssut/payload-dumper-go/releases/latest | grep browser_download_url | grep linux_amd64 | cut -d '"' -f 4)
          wget -q "$LATEST" -O payload-dumper-go.tar.gz
          tar -xzf payload-dumper-go.tar.gz
          sudo mv payload-dumper-go /usr/local/bin/
          echo "payload-dumper-go ready"

      - name: Download ROM
        run: |
          curl -L -k -o rom.zip "$LINK"
          ls -lh rom.zip

      - name: Extract payload.bin from ROM
        run: |
          mkdir -p extracted
          unzip -p rom.zip payload.bin > extracted/payload.bin 2>/dev/null || \
          7z e rom.zip payload.bin -o extracted/ 2>/dev/null || true
          ls -lh extracted/

      - name: Extract vendor and system only
        run: |
          mkdir -p payload_out
          payload-dumper-go -partitions vendor,system -o payload_out/ extracted/payload.bin
          echo "=== Extracted images ==="
          ls -lh payload_out/

      - name: Clone DumprX
        run: |
          git clone https://github.com/sarthakroy2002/DumprX --depth=1

      - name: Install DumprX Requirements
        run: |
          cd DumprX
          bash setup.sh

      - name: Run DumprX on extracted images
        run: |
          cd DumprX
          mkdir -p out
          bash dumper.sh ../payload_out/vendor.img || true
          bash dumper.sh ../payload_out/system.img || true
          echo "=== DumprX output ==="
          find out/ -maxdepth 3 -type d | head -20

      - name: Collect Files
        run: |
          mkdir -p release_files
          SEARCH_DIR="DumprX/out"

          result=$(find $SEARCH_DIR -path "*/vendor/build.prop" 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            cp "$result" release_files/vendor_build.prop
            echo "Found: $result"
          else
            echo "vendor/build.prop not found"
          fi

          result=$(find $SEARCH_DIR -path "*/vendor/etc/selinux/plat_sepolicy_vers.txt" 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            cp "$result" release_files/vendor_plat_sepolicy_vers.txt
            echo "Found: $result"
          else
            echo "vendor plat_sepolicy_vers.txt not found"
          fi

          result=$(find $SEARCH_DIR -path "*/system/etc/selinux/plat_sepolicy_vers.txt" 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            cp "$result" release_files/system_plat_sepolicy_vers.txt
            echo "Found: $result"
          else
            echo "system plat_sepolicy_vers.txt not found"
          fi

          echo "=== Files to upload ==="
          ls -lh release_files/
          [ "$(ls -A release_files/)" ] || { echo "No files collected!"; exit 1; }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dump-${{ github.event.inputs.device }}-${{ github.run_number }}
          name: "${{ github.event.inputs.device }} vendor dump"
          body: |
            Firmware: ${{ github.event.inputs.link }}
            Device: ${{ github.event.inputs.device }}
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
