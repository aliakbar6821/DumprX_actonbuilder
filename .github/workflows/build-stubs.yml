name: Build ColorOS Audio Stubs (32-bit + 64-bit)

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0, v1.1, etc.
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Verify NDK installation
        run: |
          echo "NDK_ROOT=$ANDROID_NDK_ROOT"
          ls -la $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/

      - name: Build 64-bit stubs (aarch64)
        run: |
          mkdir -p build/lib64
          
          # Build libmmlistparser.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libmmlistparser.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib64/libmmlistparser.so stub_mm_complete.cpp

          # Build libmmlistservice.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libmmlistservice.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib64/libmmlistservice.so stub_mm_complete.cpp

          # Build libiatlasservice.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libiatlasservice.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib64/libiatlasservice.so stub_mm_complete.cpp

          # Build libopluscfgpolicy.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libopluscfgpolicy.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib64/libopluscfgpolicy.so stub_mm_complete.cpp

          # Build libimmlistservice.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libimmlistservice.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib64/libimmlistservice.so stub_libimmlistservice.cpp

          # Build libatlasservice.so (NEW)
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libatlasservice.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib64/libatlasservice.so stub_libatlasservice.cpp

      - name: Build 32-bit stubs (armv7a)
        run: |
          mkdir -p build/lib
          
          # Build libmmlistparser.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libmmlistparser.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib/libmmlistparser.so stub_mm_complete.cpp

          # Build libmmlistservice.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libmmlistservice.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib/libmmlistservice.so stub_mm_complete.cpp

          # Build libiatlasservice.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libiatlasservice.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib/libiatlasservice.so stub_mm_complete.cpp

          # Build libopluscfgpolicy.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libopluscfgpolicy.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib/libopluscfgpolicy.so stub_mm_complete.cpp

          # Build libimmlistservice.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libimmlistservice.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib/libimmlistservice.so stub_libimmlistservice.cpp

          # Build libatlasservice.so (NEW)
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++ \
            -shared -fPIC -std=c++17 \
            -Wl,--soname,libatlasservice.so \
            -nostdlib++ -fno-exceptions -fno-rtti -O1 \
            -o build/lib/libatlasservice.so stub_libatlasservice.cpp

      - name: Verify builds
        run: |
          echo "=== 64-bit stubs (lib64) ==="
          ls -lh build/lib64/
          file build/lib64/*.so
          
          echo ""
          echo "=== 32-bit stubs (lib) ==="
          ls -lh build/lib/
          file build/lib/*.so
          
          echo ""
          echo "=== Check dependencies (64-bit) ==="
          readelf -d build/lib64/libmmlistparser.so | grep NEEDED || true
          readelf -d build/lib64/libatlasservice.so | grep NEEDED || true
          
          echo ""
          echo "=== Check dependencies (32-bit) ==="
          readelf -d build/lib/libmmlistparser.so | grep NEEDED || true
          readelf -d build/lib/libatlasservice.so | grep NEEDED || true
          
          echo ""
          echo "=== Verify critical symbols (libimmlistservice.so) ==="
          nm -D build/lib64/libimmlistservice.so | grep -E "sLock|sInstance" || echo "WARNING: sLock/sInstance not found!"

      - name: Get version from tag or branch
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="build-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Create installation script
        run: |
          cat > build/install_stubs.sh << 'EOF'
          #!/system/bin/sh
          # ColorOS Audio Stub Installer (Auto-generated)
          # Run as root after booting ColorOS
          
          echo "=== ColorOS Audio Stub Installer ${{ steps.version.outputs.version }} ==="
          
          if [ "$(id -u)" != "0" ]; then
             echo "ERROR: Must run as root (use 'su' first)"
             exit 1
          fi
          
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          
          echo "[1/5] Remounting /system_ext..."
          mount -o remount,rw /system_ext || { echo "Failed to remount"; exit 1; }
          
          echo "[2/5] Backing up originals..."
          mkdir -p /sdcard/coloros_backup/lib64
          mkdir -p /sdcard/coloros_backup/lib
          
          for lib in libimmlistservice.so libmmlistservice.so libmmlistparser.so libiatlasservice.so libopluscfgpolicy.so libatlasservice.so; do
              cp /system_ext/lib64/$lib /sdcard/coloros_backup/lib64/ 2>/dev/null
              cp /system_ext/lib/$lib /sdcard/coloros_backup/lib/ 2>/dev/null
          done
          
          echo "[3/5] Installing 64-bit stubs..."
          cp "$SCRIPT_DIR/lib64"/*.so /system_ext/lib64/ || { echo "Failed to copy lib64"; exit 1; }
          
          echo "[4/5] Installing 32-bit stubs..."
          cp "$SCRIPT_DIR/lib"/*.so /system_ext/lib/ || { echo "Failed to copy lib"; exit 1; }
          
          echo "[5/5] Setting permissions..."
          chmod 644 /system_ext/lib64/lib{imm,mm,iat,oplus,atlas}*.so
          chmod 644 /system_ext/lib/lib{imm,mm,iat,oplus,atlas}*.so
          
          chcon u:object_r:system_lib_file:s0 /system_ext/lib64/*.so 2>/dev/null
          chcon u:object_r:system_lib_file:s0 /system_ext/lib/*.so 2>/dev/null
          
          echo ""
          echo "=== Installation Complete! ==="
          echo "Originals backed up to /sdcard/coloros_backup/"
          echo ""
          echo "Installed stubs:"
          ls -lh /system_ext/lib64/lib{imm,mm,iat,oplus,atlas}*.so
          echo ""
          echo "Ready to reboot. Type: reboot"
          EOF
          
          chmod +x build/install_stubs.sh

      - name: Create README
        run: |
          cat > build/README.md << 'EOF'
          # ColorOS Audio Stub Package
          
          **Version:** ${{ steps.version.outputs.version }}  
          **Build Date:** $(date -u)
          
          ## What This Fixes
          
          Fixes 5-second audio delays on ColorOS (OxygenOS/RealmeUI) Android 14/15/16 when using AOSP vendor with ColorOS system.
          
          ## Contents
          
          - `lib64/` - 64-bit ARM stubs (aarch64)
            - libimmlistservice.so
            - libmmlistservice.so
            - libmmlistparser.so
            - libiatlasservice.so
            - libopluscfgpolicy.so
            - libatlasservice.so
          - `lib/` - 32-bit ARM stubs (armv7a)
            - (same as above)
          - `install_stubs.sh` - Automated installer script
          
          ## Installation
          
          ### Method 1: Automated (Recommended)
          
          ```bash
          # Extract this zip to /sdcard/
          # Then run:
          adb shell
          su
          cd /sdcard/coloros-audio-stubs
          sh install_stubs.sh
          reboot
          ```
          
          ### Method 2: Manual
          
          ```bash
          adb shell
          su
          mount -o remount,rw /system_ext
          
          # Backup originals
          mkdir -p /sdcard/backup
          cp /system_ext/lib64/lib{imm,mm,iat,oplus,atlas}*.so /sdcard/backup/
          
          # Install stubs
          cp /sdcard/coloros-audio-stubs/lib64/*.so /system_ext/lib64/
          cp /sdcard/coloros-audio-stubs/lib/*.so /system_ext/lib/
          
          # Set permissions
          chmod 644 /system_ext/lib64/*.so
          chmod 644 /system_ext/lib/*.so
          
          reboot
          ```
          
          ## Verification
          
          After reboot:
          ```bash
          # Check for delays
          adb logcat -d | grep -i "mmlist\|timeout"
          
          # Should be empty or minimal
          ```
          
          ## Rollback
          
          ```bash
          adb shell
          su
          mount -o remount,rw /system_ext
          cp /sdcard/backup/*.so /system_ext/lib64/
          reboot
          ```
          
          ## Compatibility
          
          - ✅ ColorOS 14/15/16
          - ✅ OxygenOS 14/15/16
          - ✅ RealmeUI 5.0/6.0
          - ✅ AOSP-based vendors (LineageOS vendor, etc.)
          - ✅ MediaTek MT6855/MT6877/MT6983 platforms
          
          ## Stubbed Libraries (6 total)
          
          1. **libimmlistservice.so** - Multimedia list client interface
          2. **libmmlistservice.so** - Multimedia list service implementation
          3. **libmmlistparser.so** - XML parser for multimedia app lists
          4. **libiatlasservice.so** - IAT (Intelligent Application Tuning) service
          5. **libopluscfgpolicy.so** - OPlus configuration policy
          6. **libatlasservice.so** - Atlas display/multimedia service
          
          ## Support
          
          Issues: https://github.com/${{ github.repository }}/issues
          EOF

      - name: Package release
        run: |
          cd build
          zip -r ../coloros-audio-stubs-${{ steps.version.outputs.version }}.zip lib64/ lib/ install_stubs.sh README.md

      - name: Upload artifacts (for non-tag builds)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: coloros-audio-stubs-${{ steps.version.outputs.version }}
          path: coloros-audio-stubs-${{ steps.version.outputs.version }}.zip

      - name: Create Release (for tag builds)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            coloros-audio-stubs-${{ steps.version.outputs.version }}.zip
          body: |
            ## ColorOS Audio Stub Package ${{ steps.version.outputs.version }}
            
            **Fixes 5-second audio delays** on ColorOS/OxygenOS/RealmeUI Android 14/15/16 when using AOSP vendor.
            
            ### What's Included
            - ✅ 64-bit stubs (lib64/) - ARM aarch64
            - ✅ 32-bit stubs (lib/) - ARM armv7a
            - ✅ Automated installer script
            - ✅ Full documentation
            
            ### Stubbed Libraries (6 total)
            1. `libimmlistservice.so` - Multimedia list client
            2. `libmmlistservice.so` - MM service implementation
            3. `libmmlistparser.so` - XML parser
            4. `libiatlasservice.so` - IAT service
            5. `libopluscfgpolicy.so` - Config policy
            6. `libatlasservice.so` - Atlas service (NEW in v1.2+)
            
            ### Quick Install
            ```bash
            # Download and extract coloros-audio-stubs-${{ steps.version.outputs.version }}.zip to /sdcard/
            adb shell
            su
            cd /sdcard/coloros-audio-stubs
            sh install_stubs.sh
            reboot
            ```
            
            ### Changelog
            - Added `libatlasservice.so` stub (fixes surfaceflinger boot issues)
            - Added `Singleton<ListServiceUtils>::sLock` export
            - Added `Singleton<AtlasEventUploadUtils>::sLock` export
            - Fixed bootloop on devices using liboplus_display_watchcall.so
            
            ### Verified On
            - Moto G54 (MT6855)
            - OnePlus Ace 2V
            - Realme devices with MT6877/MT6983
            
            See README.md in the zip for full installation instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
