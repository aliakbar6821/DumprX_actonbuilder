name: ROM Dumper

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: 'Direct download link to ROM zip/tgz'
        required: true
      device:
        description: 'Device codename (e.g. cancunf)'
        required: true
        default: 'cancunf'

jobs:
  dump:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone DumprX
        run: |
          git clone --depth=1 https://github.com/DumprX/DumprX DumprX

      - name: Run DumprX Setup
        run: |
          cd DumprX
          bash setup.sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Download ROM
        run: |
          cd DumprX
          aria2c -x16 -s16 -k1M "${{ github.event.inputs.rom_url }}" -o rom_file
          ls -lh rom_file

      - name: Run DumprX
        run: |
          cd DumprX
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          bash dumper.sh rom_file || true
          echo "=== Output directory structure ==="
          find out/ -maxdepth 4 -type d 2>/dev/null | head -30 || echo "No out/ directory found"

      - name: Collect files
        run: |
          mkdir -p release_files
          SEARCH_DIR="DumprX/out"

          # vendor/build.prop
          result=$(find $SEARCH_DIR -path "*/vendor/build.prop" 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            cp "$result" release_files/vendor_build.prop
            echo "Found vendor/build.prop: $result"
          else
            echo "vendor/build.prop not found"
          fi

          # vendor/etc/selinux/plat_sepolicy_vers.txt
          result=$(find $SEARCH_DIR -path "*/vendor/etc/selinux/plat_sepolicy_vers.txt" 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            cp "$result" release_files/vendor_plat_sepolicy_vers.txt
            echo "Found vendor plat_sepolicy_vers.txt: $result"
          else
            echo "vendor plat_sepolicy_vers.txt not found"
          fi

          # system/etc/selinux/plat_sepolicy_vers.txt
          result=$(find $SEARCH_DIR -path "*/system/etc/selinux/plat_sepolicy_vers.txt" 2>/dev/null | head -1)
          if [ -n "$result" ]; then
            cp "$result" release_files/system_plat_sepolicy_vers.txt
            echo "Found system plat_sepolicy_vers.txt: $result"
          else
            echo "system plat_sepolicy_vers.txt not found"
          fi

          echo "=== Files to upload ==="
          ls -lh release_files/
          [ "$(ls -A release_files/)" ] || { echo "No files collected!"; exit 1; }

      - name: Upload files to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dump-${{ github.event.inputs.device }}-${{ github.run_number }}
          name: "${{ github.event.inputs.device }} vendor dump"
          body: |
            ROM URL: ${{ github.event.inputs.rom_url }}
            Device: ${{ github.event.inputs.device }}
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
